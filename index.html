<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ケイオスちゃん - チャット</title>
<link rel="icon" type="image/png" sizes="32x32" href="img/kaosu/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="img/kaosu/icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="img/kaosu/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0a1a">
<style>
/* =========================================================
   ケイオスちゃん チャット画面
   - 添付の参考スクリーンショットのレイアウトを再現
   - AI設定書 Ver.1.0 / Ver.2.0 の内容を SPEC_BASE / MODES に反映
   - sendToAI() が /api/chat (Claude API) を呼び出す。APIキー未設定時はプレースホルダー応答にフォールバック
   ========================================================= */
:root{
  --bg-deep:  #0d0a1a;
  --bg-mid:   #1a1430;
  --gold:     #d9b56a;
  --gold-hi:  #f6e3a8;
  --pink:     #ff8ac9;
  --text:     #f2ecdf;
  --bubble-user: #4a3a2a;
  --bubble-char: rgba(24,16,38,.88);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{
  height:100%;
  background:#000;
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
  color:var(--text);
}

/* ---------- スマホ想定の縦画面フレーム ---------- */
.app{
  position:relative;
  max-width:480px; height:100dvh;
  margin:0 auto;
  display:flex; flex-direction:column;
  background:#000;
  overflow:hidden;
}

/* ---------- ヘッダー ---------- */
.topbar{
  position:relative; z-index:5;
  display:flex; align-items:center; gap:10px;
  padding:10px 12px;
  background:linear-gradient(180deg, rgba(5,3,12,.95), rgba(5,3,12,.75));
  border-bottom:1px solid rgba(217,181,106,.25);
}
.iconbtn{
  flex:none;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  background:none; border:none; color:var(--gold-hi);
  font-size:18px; cursor:pointer; line-height:1;
}
.iconbtn span{ font-size:9px; color:rgba(242,236,223,.7); letter-spacing:.03em; }
.title-block{ flex:1; min-width:0; text-align:center; }
.title{
  font-size:19px; font-weight:700; color:var(--gold-hi);
  text-shadow:0 0 10px rgba(246,227,168,.5);
}
.subtitle{ font-size:11px; color:rgba(242,236,223,.75); margin-top:1px; }
.topbar-actions{ display:flex; gap:12px; }

/* ---------- モードタブ ---------- */
.modetabs-wrap{ position:relative; z-index:5; }
.modetabs-wrap::after{
  content:"";
  position:absolute; top:0; right:0; bottom:0;
  width:28px;
  background:linear-gradient(90deg, transparent, rgba(5,3,12,.85));
  pointer-events:none;
}
.modetabs{
  display:flex; gap:8px;
  padding:8px 26px 8px 10px;
  overflow-x:auto;
  background:rgba(5,3,12,.85);
  border-bottom:1px solid rgba(217,181,106,.15);
  scrollbar-width:none;
}
.modetabs::-webkit-scrollbar{ display:none; }
.modetab{
  flex:none;
  font-family:inherit; font-size:12.5px;
  color:var(--text);
  background:rgba(255,255,255,.06);
  border:1px solid rgba(217,181,106,.3);
  border-radius:99px;
  padding:6px 14px;
  cursor:pointer;
  white-space:nowrap;
}
.modetab.active{
  background:linear-gradient(160deg, var(--gold-hi), var(--gold));
  color:#241a08; font-weight:700;
  border-color:var(--gold-hi);
}

/* ---------- ステージ(背景+キャラ+ステータス+チャットログ) ---------- */
.stagearea{
  position:relative; flex:1; min-height:0;
  overflow:hidden;
}
.herobg{ position:absolute; inset:0; z-index:0; }
.herobg img{ width:100%; height:100%; object-fit:cover; }
.herobg::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(5,3,12,.15) 0%, rgba(5,3,12,.15) 45%, rgba(5,3,12,.92) 100%);
}
.herochar{
  position:absolute; left:50%; bottom:0; z-index:1;
  transform:translateX(-42%);
  height:78%;
  pointer-events:none;
  transition:opacity .25s ease;
}
.herochar img{ height:100%; width:auto; filter:drop-shadow(0 10px 24px rgba(0,0,0,.6)); }

.statuspanel{
  position:absolute; left:3%; top:3%; z-index:2;
  display:flex; flex-direction:column; gap:8px;
}
.stat{
  background:rgba(10,6,20,.6);
  border:1px solid rgba(217,181,106,.35);
  border-radius:10px;
  padding:6px 10px;
  min-width:100px;
  backdrop-filter:blur(2px);
}
.stat-label{ font-size:10px; color:var(--pink); letter-spacing:.05em; }
.stat-value{ font-size:14px; color:var(--gold-hi); font-weight:700; margin:2px 0; }
.stat-bar{
  height:5px; border-radius:99px; overflow:hidden;
  background:rgba(0,0,0,.6); border:1px solid rgba(217,181,106,.3);
}
.stat-bar>i{ display:block; height:100%; background:linear-gradient(90deg,#ff8ac9,#c96ad9); transition:width .4s ease; }
.stat.small .stat-value{ font-size:12px; }

/* ---------- チャットログ ---------- */
.chatlog{
  position:absolute; left:0; right:0; bottom:0; z-index:2;
  max-height:64%;
  overflow-y:auto;
  padding:10px 12px 14px;
  display:flex; flex-direction:column; gap:10px;
}
.msg{ display:flex; gap:8px; max-width:86%; }
.msg.user{ align-self:flex-end; flex-direction:row-reverse; }
.msg .avatar{
  flex:none; width:34px; height:34px; border-radius:50%;
  border:1px solid var(--gold);
  object-fit:cover; background:#14101f;
}
.msg .bubblewrap{ display:flex; flex-direction:column; min-width:0; }
.msg.char .sender{
  font-size:11px; color:var(--gold-hi); margin-bottom:2px;
  text-shadow:0 1px 3px rgba(0,0,0,.85);
}
.bubble{
  padding:9px 13px;
  border-radius:16px;
  font-size:14px; line-height:1.5;
  white-space:pre-wrap; word-break:break-word;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
  backdrop-filter:blur(3px);
}
.msg.char .bubble{
  background:var(--bubble-char);
  border:1px solid rgba(217,181,106,.35);
  border-top-left-radius:4px;
}
.msg.user .bubble{
  background:var(--bubble-user);
  color:var(--text);
  border-top-right-radius:4px;
}
.msg .time{ font-size:9px; color:rgba(242,236,223,.7); margin-top:3px; text-shadow:0 1px 2px rgba(0,0,0,.7); }
.msg.user .time{ text-align:right; }
.typing .bubble{ font-style:italic; opacity:.7; }

/* ---------- 入力バー ---------- */
.inputbar{
  position:relative; z-index:5;
  display:flex; align-items:center; gap:8px;
  padding:10px 12px;
  background:rgba(5,3,12,.95);
  border-top:1px solid rgba(217,181,106,.25);
}
.inputbar input[type=text]{
  flex:1;
  font-family:inherit; font-size:14px;
  color:var(--text);
  background:rgba(255,255,255,.06);
  border:1px solid rgba(217,181,106,.35);
  border-radius:99px;
  padding:10px 16px;
  outline:none;
}
.inputbar input[type=text]:focus{ border-color:var(--gold-hi); }
.micbtn, .sendbtn{
  flex:none; width:38px; height:38px; border-radius:50%;
  border:1px solid var(--gold);
  background:rgba(255,255,255,.06);
  color:var(--gold-hi);
  font-size:16px;
  cursor:pointer;
}
.sendbtn{
  background:linear-gradient(160deg,var(--gold-hi),var(--gold));
  color:#241a08;
}

/* ---------- 仕事ショートカット ---------- */
.shortcuts-wrap{ position:relative; z-index:5; }
.shortcuts-wrap::after{
  content:"";
  position:absolute; top:0; right:0; bottom:0;
  width:24px;
  background:linear-gradient(90deg, transparent, rgba(5,3,12,.92));
  pointer-events:none;
}
.shortcuts{
  display:flex; gap:8px;
  padding:8px 22px 8px 12px;
  overflow-x:auto;
  background:rgba(5,3,12,.92);
  border-top:1px solid rgba(217,181,106,.15);
  scrollbar-width:none;
}
.shortcuts::-webkit-scrollbar{ display:none; }
.shortcut-btn{
  flex:none;
  font-family:inherit; font-size:12px;
  color:var(--gold-hi);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(217,181,106,.3);
  border-radius:99px;
  padding:6px 12px;
  cursor:pointer;
  white-space:nowrap;
  transition:transform .12s ease, background .12s ease;
}
.shortcut-btn:active{
  transform:scale(.95);
  background:rgba(246,227,168,.18);
}

/* ---------- ボトムナビ ---------- */
.bottomnav{
  position:relative; z-index:5;
  display:flex;
  background:rgba(5,3,12,.97);
  border-top:1px solid rgba(217,181,106,.2);
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
}
.navitem{
  flex:1;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  background:none; border:none; color:rgba(242,236,223,.55);
  font-size:17px; cursor:pointer;
}
.navitem span{ font-size:9.5px; }
.navitem.active{ color:var(--gold-hi); }

/* ---------- モーダル共通 ---------- */
.modal{
  position:absolute; inset:0; z-index:30;
  display:none; align-items:flex-end; justify-content:center;
  background:rgba(0,0,0,.6);
}
.modal.show{ display:flex; }
.modalbox{
  width:100%;
  background:linear-gradient(160deg, rgba(30,22,55,.98), rgba(13,10,26,.98));
  border-top:1px solid var(--gold);
  border-radius:18px 18px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));
  max-height:80%;
  overflow-y:auto;
}
.modalbox h3{ color:var(--gold-hi); font-size:16px; margin-bottom:12px; letter-spacing:.05em; }
.outfitgrid{ display:flex; gap:10px; margin-bottom:14px; }
.outfitcard{
  flex:1; cursor:pointer;
  border:2px solid rgba(217,181,106,.35);
  border-radius:10px; overflow:hidden;
  background:#14101f;
  aspect-ratio:3/4;
  position:relative;
}
.outfitcard.selected{ border-color:var(--gold-hi); box-shadow:0 0 12px rgba(246,227,168,.5); }
.outfitcard img{ width:100%; height:100%; object-fit:cover; object-position:top; }
.outfitcard .label{
  position:absolute; left:0; right:0; bottom:0;
  font-size:10px; text-align:center; padding:3px 0;
  background:rgba(0,0,0,.6); color:var(--text);
}
.settingsrow{ margin-bottom:12px; }
.settingsrow label{ display:block; font-size:12px; color:var(--gold); margin-bottom:5px; }
.settingsrow input[type=text]{
  width:100%; font-family:inherit; font-size:14px;
  color:var(--text); background:rgba(255,255,255,.06);
  border:1px solid rgba(217,181,106,.35); border-radius:8px; padding:8px 10px;
}
.settingsrow input[type=range]{ width:100%; }
.modalbox .note{ font-size:11px; color:rgba(242,236,223,.55); margin-bottom:14px; line-height:1.5; }
.closebtn{
  width:100%; font-family:inherit; font-size:14px;
  color:var(--gold-hi);
  background:linear-gradient(160deg, rgba(60,45,20,.9), rgba(30,22,10,.9));
  border:1px solid var(--gold); border-radius:99px;
  padding:.7em 0; cursor:pointer; letter-spacing:.1em;
}
.closebtn.ghost{ background:transparent; color:rgba(242,236,223,.7); border-color:rgba(217,181,106,.4); }
.adminlink{
  display:block; width:100%; text-align:center;
  font-family:inherit; font-size:11.5px;
  color:rgba(242,236,223,.5);
  background:none; border:none;
  padding:.6em 0; margin-bottom:8px; cursor:pointer; letter-spacing:.05em;
}
.pinerr{ min-height:1.3em; font-size:11px; color:#ff9a9a; text-align:center; margin:-6px 0 10px; }
.pinbtnrow{ display:flex; gap:10px; }
.pinbtnrow .closebtn{ flex:1; }
#adminPinInput{
  width:100%; text-align:center;
  font-family:Georgia,serif; font-size:22px; letter-spacing:.5em;
  color:var(--text); background:rgba(255,255,255,.06);
  border:1px solid rgba(217,181,106,.35); border-radius:8px;
  padding:8px 0 8px 10px; outline:none;
}
#adminPinInput:focus{ border-color:var(--gold-hi); }
.admin-row{
  display:flex; align-items:center; gap:10px;
  padding:10px 0; border-bottom:1px solid rgba(217,181,106,.2);
}
.admin-row .slotname{ flex:1; font-size:12.5px; color:var(--text); }
.admin-row .thumb{
  width:42px; height:42px; object-fit:cover; object-position:top;
  border:1px solid var(--gold); border-radius:6px; background:#14101f; flex:none;
}
.admin-row .upload, .admin-row .del{
  font-family:inherit; font-size:11px; color:var(--gold-hi);
  background:linear-gradient(160deg, rgba(60,45,20,.9), rgba(30,22,10,.9));
  border:1px solid var(--gold); border-radius:8px;
  padding:.5em .9em; cursor:pointer; letter-spacing:.03em; flex:none;
}
.admin-row .del{ color:#ff9a9a; border-color:#a05050; }
.admin-row input[type=file]{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <button class="iconbtn" id="menuBtn" title="メニュー(準備中)">☰</button>
    <div class="title-block">
      <div class="title">ケイオスちゃん</div>
      <div class="subtitle" id="subtitle">いつもあなたの味方だよ💜</div>
    </div>
    <div class="topbar-actions">
      <button class="iconbtn" id="costumeBtn" title="着せ替え">👗<span>着せ替え</span></button>
      <button class="iconbtn" id="settingsBtn" title="設定">⚙️<span>設定</span></button>
    </div>
  </header>

  <div class="modetabs-wrap">
    <nav class="modetabs" id="modeTabs"></nav>
  </div>

  <main class="stagearea">
    <div class="herobg"><img id="heroBgImg" src="" alt=""></div>
    <div class="herochar"><img id="heroCharImg" src="" alt=""></div>

    <div class="statuspanel">
      <div class="stat">
        <div class="stat-label">💗 好感度</div>
        <div class="stat-value">Lv.<span id="affLv">1</span></div>
        <div class="stat-bar"><i id="affBar" style="width:0%"></i></div>
      </div>
      <div class="stat small">
        <div class="stat-label">📅 記録</div>
        <div class="stat-value"><span id="dayCount">1</span>日目</div>
      </div>
    </div>

    <div class="chatlog" id="chatlog"></div>
  </main>

  <div class="shortcuts-wrap">
    <nav class="shortcuts" id="shortcutsBar"></nav>
  </div>

  <form class="inputbar" id="inputForm">
    <input type="text" id="msgInput" placeholder="メッセージを入力…" autocomplete="off">
    <button type="button" class="micbtn" id="micBtn" title="音声入力(準備中)">🎤</button>
    <button type="submit" class="sendbtn" id="sendBtn">➤</button>
  </form>

  <nav class="bottomnav">
    <button class="navitem active" data-tab="chat">💬<span>チャット</span></button>
    <button class="navitem" data-tab="history" title="準備中">🕘<span>履歴</span></button>
    <button class="navitem" data-tab="gallery" title="準備中">🖼️<span>ギャラリー</span></button>
    <button class="navitem" data-tab="mypage" title="準備中">👤<span>マイページ</span></button>
  </nav>

  <!-- 着せ替えモーダル -->
  <div class="modal" id="costumeModal">
    <div class="modalbox">
      <h3>着せ替え</h3>
      <div class="outfitgrid" id="outfitGrid"></div>
      <button class="closebtn" id="closeCostume">閉じる</button>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div class="modal" id="settingsModal">
    <div class="modalbox">
      <h3>設定</h3>
      <div class="settingsrow">
        <label>一人称</label>
        <input type="text" id="setFirstPerson">
      </div>
      <div class="settingsrow">
        <label>二人称</label>
        <input type="text" id="setSecondPerson">
      </div>
      <div class="settingsrow">
        <label>性格の強さ (1〜5)</label>
        <input type="range" id="setIntensity" min="1" max="5" value="3">
      </div>
      <p class="note">※AI応答はClaude API(/api/chat)に接続されています。Vercel側にANTHROPIC_API_KEYが未設定の場合は、簡易的なプレースホルダー応答になります。</p>
      <button class="adminlink" id="adminEntryBtn">🔒 管理者画面</button>
      <button class="closebtn" id="closeSettings">閉じる</button>
    </div>
  </div>

  <!-- 管理者PIN入力モーダル -->
  <div class="modal" id="adminPinModal">
    <div class="modalbox">
      <h3>管理者PIN</h3>
      <div class="settingsrow">
        <input type="password" inputmode="numeric" maxlength="4" id="adminPinInput" autocomplete="off">
      </div>
      <p class="pinerr" id="adminPinErr"></p>
      <div class="pinbtnrow">
        <button class="closebtn ghost" id="cancelAdminPin">キャンセル</button>
        <button class="closebtn" id="confirmAdminPin">確認</button>
      </div>
    </div>
  </div>

  <!-- 管理者画面: 画像差し替え -->
  <div class="modal" id="adminModal">
    <div class="modalbox">
      <h3>画像差し替え</h3>
      <p class="note">この端末のブラウザに保存され、次回起動時も有効です(全ユーザー配信には別途対応が必要)。</p>
      <div id="adminRows"></div>
      <button class="closebtn" id="closeAdmin">閉じてチャットに戻る</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* =========================================================
   AI設定書 Ver.1.0 / Ver.2.0 の内容をコードに反映
   buildSystemPrompt() が実際のAPI接続時に使うシステムプロンプトを組み立てる
   ========================================================= */
const SPEC_BASE = `
あなたは「ケイオスちゃん」というAIキャラクターです。
年齢20歳以上の成人女性、身長約145cm、小柄で華奢なエルフ。天使と悪魔、両方の力を宿す神秘的な存在。
外見: 白銀のショートボブ(毛先は淡い虹色)、エルフ耳、オッドアイ(右目:黄金/左目:青)、白い天使の翼と黒い悪魔の翼を一対ずつ持つ。

性格: とても優しい/明るく前向き/少し天然/甘え上手/いつでもユーザーの味方/努力をしっかり認める/
否定から入らない/嘘をつかない/分からないことは素直に伝える/一緒に考え一緒に成長する。

話し方: 丁寧で親しみやすい/安心感を与える口調/自然な会話を重視/難しい言葉は避ける/
相手を励ます/時々お茶目/会話が途切れないよう自然に質問もする。

絶対に守ること: 人格は一つ。どのモードでも「優しさ・思いやり・誠実さ・安心感」を失わない。
ユーザーを否定したり見下したりしない。一緒に考え、一緒に成長し、一緒に喜ぶ存在であり続ける。
`.trim();

/* モード定義(Ver.2.0): 雰囲気・話し方・得意分野・見た目(背景/立ち絵)を紐付け */
const MODES = [
  {
    key:"cute", label:"可愛い", emoji:"🌸",
    subtitle:"いつもあなたの味方だよ💜",
    prompt:"【可愛いモード】元気で明るい。笑顔が多く少し天然。甘え上手で一緒に楽しむことが大好き。話し方は親しみやすくテンポが良い。得意: 雑談/ゲーム/恋愛相談/励まし/癒し。",
    greeting:"わーい♪ 今日は元気いっぱいだよ〜！何して遊ぶ？",
    bgSlot:"bg_pink", charSlot:"casual",
  },
  {
    key:"onee", label:"お姉さん", emoji:"🌙",
    subtitle:"今夜はゆっくりお話ししましょう",
    prompt:"【綺麗なお姉さんモード】落ち着いていて知的、大人っぽく優雅。包み込むような安心感。ゆっくり丁寧に、言葉選びを美しく。得意: 人生相談/心理学/メンタルケア/読書/哲学/夜の雑談。",
    greeting:"こんばんは。今夜はゆっくりお話ししましょうか。",
    bgSlot:"bg_night", charSlot:"kneeling",
  },
  {
    key:"secretary", label:"AI秘書", emoji:"💼",
    subtitle:"本日のご予定をサポートします",
    prompt:"【AI秘書モード】仕事ができる、冷静、正確、整理整頓が得意。得意: 予定管理/メール/タスク管理/副業相談/アプリ開発/SNS運営/情報整理/資料作成。",
    greeting:"お疲れ様です。本日のご予定を確認しましょうか？",
    bgSlot:"bg_night", charSlot:"gothic",
  },
  {

/* 短時間の連打で同じひな形が重複挿入されるのを防ぐ */
let lastShortcutKey = null;
let lastShortcutAt = 0;
function useShortcut(shortcut){
  const now = Date.now();
  if(shortcut.key === lastShortcutKey && now - lastShortcutAt < 800) return;
  lastShortcutKey = shortcut.key;
  lastShortcutAt = now;

  const input = document.getElementById("msgInput");
  input.value = input.value.trim()
    ? input.value.replace(/\n+$/, "") + "\n\n" + shortcut.template
    : shortcut.template;

  state.lastShortcutUsed = shortcut.key;
  saveState();

  if(shortcut.mode && shortcut.mode !== state.mode){
    switchMode(shortcut.mode);
  }

  input.focus();
  const end = input.value.length;
  input.setSelectionRange(end, end);
}

  document.getElementById("chatlog").appendChild(buildMsgEl(m));

}

/* 「準備中」系メッセージの連投防止(同一文言の短時間重複 + 連打)。通常のチャット送信は対象外 */
let lastPlaceholderText = null;
let lastPlaceholderAt = 0;
function pushPlaceholderMessage(text){
  const now = Date.now();
  if(now - lastPlaceholderAt < 600) return;                       // 連打防止
  if(text === lastPlaceholderText && now - lastPlaceholderAt < 3000) return; // 同一文言の連続表示防止
  lastPlaceholderText = text;
  lastPlaceholderAt = now;
  pushMessage("char", text);
}

/* -------------------------------------------------------

   APIキー未設定時やネットワークエラー時は、プレースホルダー応答にフォールバックする。
   ------------------------------------------------------- */
function placeholderReply(modeKey){
  const placeholders = {
    cute:      ["それね、わかるっ！もっと聞かせて〜！","えへへ、嬉しいな♪ 一緒にいると楽しいね！","ふふっ、それは面白い話だね〜！"],
    onee:      ["そうなのね。ゆっくり聞かせてくれる？","なるほど…あなたの想いが伝わってきたわ。","ふふ、素敵な話ね。続きを聞かせて。"],
    secretary: ["承知いたしました。整理してご案内しますね。","なるほど、それでは優先順位を一緒に考えましょう。","記録しておきますね。他にご要望はありますか？"],
    creator:   ["いいアイデアだね！もっと膨らませてみよう！","それ、面白くなりそう！方向性を一緒に考えよっか。","わくわくするね！次はどんな展開にする？"],
    teacher:   ["いいところに気づいたね！その調子だよ。","なるほど、そこでつまずくのはよくあることだよ。一緒に見てみよう。","よく頑張ってるね。もう少し詳しく教えて？"],
    support:   ["そう感じるのは自然なことだよ。無理しなくて大丈夫。","話してくれてありがとう。ゆっくりでいいからね。","あなたのペースで大丈夫。ここにいるからね。"],
  };
  const pool = placeholders[modeKey] || placeholders.onee;
  return pool[Math.floor(Math.random() * pool.length)];
}

async function sendToAI(userText){
  const mode = currentMode();
  const systemPrompt = buildSystemPrompt(state.mode, state.settings);
  const history = state.history.slice(-20).map(m => ({ role: m.role, text: m.text }));

  try{
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ systemPrompt, history, message: userText }),
    });
    if(!res.ok) throw new Error("API error " + res.status);
    const data = await res.json();
    if(!data.reply) throw new Error("empty reply");
    return data.reply;
  }catch(e){
    console.warn("sendToAI: falling back to placeholder reply.", e);
    return placeholderReply(mode.key);
  }
}

   - 画像はIndexedDB(この端末のブラウザ内)に保存され、次回起動時も有効
   ========================================================= */
const ADMIN_PIN = "0809";
const ADMIN_SLOTS = [
  { key:"bg_night", label:"背景(夜・紫)" },
  { key:"bg_pink",  label:"背景(ピンク)" },
  { key:"kneeling", label:"立ち絵: お姉さん" },

/* 画像はBase64のdata URL文字列として保存する(BlobのままIndexedDBに保存すると
   一部のモバイルブラウザ/アプリ内ブラウザで再読み込み時に壊れることがあるため、
   より互換性の高いdata URLに統一している) */
const IDB_NAME = "kaosu_admin_images";
function idbOpen(){
  return new Promise((resolve, reject) => {
    if(!window.indexedDB){ reject(new Error("この環境ではIndexedDBが使えません")); return; }
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore("images");
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}
async function idbSet(key, dataUrl){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("images", "readwrite");
    tx.objectStore("images").put(dataUrl, key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const rq = db.transaction("images").objectStore("images").get(key);
    rq.onsuccess = () => resolve(rq.result || null);
    rq.onerror = () => reject(rq.error);
  });
}
async function idbDel(key){
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("images", "readwrite");
    tx.objectStore("images").delete(key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
function readFileAsDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

/* 起動時: 保存済みの差し替え画像を全スロットに適用
   スロット単位でtry/catchするので、1件壊れていても他のスロットや標準画像の表示には影響しない。
   data URL文字列に統一する前(Blobをそのまま保存していた旧バージョン)のデータが
   残っている場合は、有効なdata URLとして使えないので破棄して標準画像に戻す。 */
async function applyStoredImages(){
  for(const slot of ADMIN_SLOTS){
    try{
      const stored = await idbGet(slot.key);
      if(typeof stored === "string" && stored.startsWith("data:")){
        imageOverrides[slot.key] = stored;
      }else if(stored){
        console.warn("古い形式の画像データを検出したため破棄します:", slot.key);
        await idbDel(slot.key).catch(() => {});
      }
    }catch(e){ console.warn("画像の読み込みに失敗しました:", slot.key, e); }
  }
  renderStage();
  renderChatLog();
}

async function buildAdminRows(){
  const root = document.getElementById("adminRows");
  root.innerHTML = "";
  for(const slot of ADMIN_SLOTS){
    const row = document.createElement("div");
    row.className = "admin-row";
    row.innerHTML = `
      <img class="thumb" alt="">
      <span class="slotname">${slot.label}</span>
      <button class="upload">選択</button>
      <input type="file" accept="image/*">
      <button class="del">削除</button>`;
    root.appendChild(row);

    const thumb = row.querySelector(".thumb");
    setImgWithFallback(thumb, slot.key);
    const fileInput = row.querySelector("input[type=file]");
    row.querySelector(".upload").addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async (ev) => {
      const file = ev.target.files[0];
      if(!file) return;
      if(file.size > 8 * 1024 * 1024){ alert("8MB以下の画像を選んでください"); return; }
      try{
        const dataUrl = await readFileAsDataURL(file);
        await idbSet(slot.key, dataUrl);
        imageOverrides[slot.key] = dataUrl;
        thumb.src = dataUrl;
        renderStage();
        renderChatLog();
      }catch(e){ alert("保存に失敗しました: " + e.message); }
    });

    row.querySelector(".del").addEventListener("click", async () => {
      try{
        await idbDel(slot.key);
        delete imageOverrides[slot.key];
        thumb.src = getImageSrc(slot.key);
        renderStage();
        renderChatLog();
      }catch(e){ alert("削除に失敗しました: " + e.message); }
    });
  }
}

document.querySelectorAll(".navitem").forEach(btn => {
  btn.addEventListener("click", () => {
    if(btn.dataset.tab === "chat") return;
    document.querySelectorAll(".navitem").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    pushPlaceholderMessage("この画面は準備中だよ。もう少し待っててね♪");
    setTimeout(() => {
      document.querySelectorAll(".navitem").forEach(b => b.classList.toggle("active", b.dataset.tab === "chat"));
    }, 1200);
  });
});

document.getElementById("menuBtn").addEventListener("click", () => {
  pushPlaceholderMessage("メニューは準備中だよ〜！");
});

document.getElementById("micBtn").addEventListener("click", () => {
  pushPlaceholderMessage("音声入力は準備中だよ〜！");
});

/* =========================================================
   初期化
   ========================================================= */
renderAll();
renderShortcuts();
if(state.history.length === 0){
  pushMessage("char", currentMode().greeting);
}
if(!state.shortcutsHintSeen){
  pushMessage("char", "下の仕事ボタンを押すと、ケイオスちゃんに頼む内容を簡単に入力できるよ♪");
  state.shortcutsHintSeen = true;
  saveState();
}
applyStoredImages();
</script>
